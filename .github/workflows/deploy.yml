name: Deploy to GitHub Pages

# Builds the Next.js docs site (static export) and the Storybook workbench, then
# publishes them together: docs at the site root, Storybook under /storybook/.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify design tokens (1,806)
        run: pnpm sync:tokens:check

      - name: Build docs site (static export)
        env:
          GITHUB_PAGES: "true"
        run: pnpm build

      - name: Build Storybook
        run: pnpm build-storybook

      - name: Assemble Pages output (docs + /storybook)
        run: |
          mv storybook-static out/storybook
          touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
